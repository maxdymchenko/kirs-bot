# Деплой на Render: Web Service (Mini App + бот + OLX)
# https://render.com/docs/web-services
#
# Секреты задаются в Environment Variables вручную.

services:
  - type: web
    name: kirs-bot
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: EMAIL_HOST
        value: imap.gmail.com
      - key: EMAIL_PORT
        value: "993"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: STOCK_SPREADSHEET_ID
        value: 1HE1HmyuSevSIYBvk3UiRkoYZgRSdmGqH7ZvK6BFBBCg
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: WEBAPP_URL
        sync: false
