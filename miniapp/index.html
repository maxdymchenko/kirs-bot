<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Kirs — Замовлення</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">KIRS</div>
      <button type="button" class="cart-chip" id="cartChip" aria-label="Кошик">
        <span class="cart-chip-icon">🛒</span>
        <span id="cartChipText">0</span>
      </button>
    </header>

    <nav class="tabs">
      <button type="button" class="tab active" data-tab="catalog">Каталог</button>
      <button type="button" class="tab" data-tab="cart">Кошик <span class="badge" id="cartBadge">0</span></button>
    </nav>

    <main>
      <section id="catalogView" class="view">
        <h1 class="title">Оформити замовлення</h1>
        <p class="hint">Введіть код товару і натисніть «Пошук»</p>

        <form id="searchForm" class="search-row">
          <input
            id="searchInput"
            type="text"
            inputmode="numeric"
            autocomplete="off"
            placeholder="Код товару, наприклад 010"
          />
          <button type="submit" class="btn primary">Пошук</button>
        </form>

        <div id="status" class="status"></div>
        <div id="results" class="results"></div>
      </section>

      <section id="cartView" class="view hidden">
        <h1 class="title">Кошик</h1>
        <div id="cartEmpty" class="empty">Кошик порожній. Знайдіть товар за кодом і додайте його.</div>
        <div id="cartList" class="cart-list"></div>
        <div id="cartFooter" class="cart-footer hidden">
          <div class="cart-total">Позицій: <strong id="cartCount">0</strong></div>
          <button type="button" class="btn primary block" id="checkoutBtn">Оформити замовлення</button>
          <p class="footnote">Оформлення даних клієнта / ТТН — наступний етап</p>
        </div>
      </section>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
